<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SimAutomate5</title>
    <link rel="stylesheet" href="./oat.min.css" />
    <script src="./oat.min.js" defer></script>
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./main.js" defer></script>
    <script type="module" src="./config.js" defer></script>
    <script type="module" src="./status.js" defer></script>
    <script type="module" src="./connection-options.js" defer></script>
    <script type="module" src="./messages.js" defer></script>
    <script type="module" src="./connection.js" defer></script>
  </head>
  <body>
    <header class="hstack justify-between">
      <div>
        <button
          class="small semibold px-4"
          data-variant="secondary"
          id="client-mode"
        >
          Client
        </button>
        <button
          class="small ghost semibold px-4"
          data-variant="secondary"
          id="server-mode"
        >
          Server
        </button>
      </div>

      <div class="hstack">
        <span class="badge outline" id="status">Disconnected</span>
        <button
          class="small"
          commandfor="protocol-options"
          command="show-modal"
        >
          Protocol Options
        </button>
      </div>
    </header>

    <main class="flex">
      <div id="connection-options">
        <div id="client-options">
          <div class="title py-2 px-4">
            <span>Client - Connect to server</span>
          </div>

          <form class="vstack justify-between py-2 px-4">
            <label>
              Host
              <input type="text" placeholder="localhost" name="host" required />
            </label>

            <label>
              Port
              <input type="number" placeholder="12345" name="port" required />
            </label>

            <button id="client-connect-btn" data-variant="success">
              Connect
            </button>
          </form>
        </div>

        <div id="server-options" class="hidden">
          <div class="title py-2 px-4">
            <span>Server - Start server</span>
          </div>

          <form class="vstack justify-between py-2 px-4">
            <label>
              Port
              <input
                type="number"
                placeholder="12345"
                name="server-port"
                required
              />
            </label>

            <button id="server-connect-btn" data-variant="success">
              Start server
            </button>
          </form>
        </div>
      </div>

      <div id="chat" class="vstack gap-0">
        <div class="title hstack justify-between w-100 py-2 px-4">
          <span>Messages</span>
          <button class="small outline" id="clear-chat">Clear</button>
        </div>

        <div id="messages" class="vstack gap-0">
          <div id="no-connection">
            <span>No connection</span><br />
            <span>Configure and connect to a server.</span>
          </div>
        </div>

        <form id="message-form" class="py-2 px-4 vstack gap-2">
          <textarea
            type="text"
            placeholder="Type a message..."
            required
            name="message"
          ></textarea>
          <div class="hstack gap-2 justify-end">
            <button class="outline small" type="reset">Clear</button>
            <button data-variant="primary" class="small" disabled type="submit">
              Send
            </button>
          </div>
        </form>
      </div>

      <div id="special-chars" class="vstack">
        <button class="small" data-variant="secondary">ENQ</button>
        <button class="small" data-variant="secondary">VT</button>
        <button class="small" data-variant="secondary">FS.CR</button>
        <button class="small" data-variant="secondary">CR</button>
        <button class="small" data-variant="secondary">ACK</button>
        <button class="small" data-variant="secondary">NAK</button>
        <button class="small" data-variant="secondary">EOT</button>
      </div>
    </main>
  </body>
</html>
