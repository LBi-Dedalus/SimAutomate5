<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SimAutomate5</title>
    <link rel="stylesheet" href="./oat.min.css" />
    <script src="./oat.min.js" defer></script>
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./config.js" defer></script>
    <script type="module" src="./status.js" defer></script>
    <script type="module" src="./connection-options.js" defer></script>
    <script type="module" src="./messages.js" defer></script>
    <script type="module" src="./connection.js" defer></script>
    <script type="module" src="./special-chars.js" defer></script>
    <script type="module" src="./autobuild.js" defer></script>
    <script type="module" src="./autoresponse.js" defer></script>
  </head>
  <body>
    <header class="hstack justify-between">
      <div>
        <button
          class="small semibold px-4"
          data-variant="secondary"
          id="client-mode"
        >
          Client
        </button>
        <button
          class="small ghost semibold px-4"
          data-variant="secondary"
          id="server-mode"
        >
          Server
        </button>
      </div>

      <span class="badge outline text-small" id="status">Disconnected</span>
    </header>

    <main class="flex">
      <div id="connection-options">
        <div id="client-options">
          <div class="title py-2 px-4">
            <span>Client - Connect to server</span>
          </div>

          <form class="vstack justify-between py-2 px-4">
            <label>
              Host
              <input type="text" placeholder="localhost" name="host" required />
            </label>

            <label>
              Port
              <input type="number" placeholder="12345" name="port" required />
            </label>

            <button id="client-connect-btn">Connect</button>
          </form>
        </div>

        <div id="server-options" class="hidden">
          <div class="title py-2 px-4">
            <span>Server - Start server</span>
          </div>

          <form class="vstack justify-between py-2 px-4">
            <label>
              Port
              <input
                type="number"
                placeholder="12345"
                name="server-port"
                required
              />
            </label>

            <button id="server-connect-btn">Start server</button>
          </form>
        </div>

        <div id="autoresponse-options">
          <div class="title py-2 px-4">
            <span>Auto response</span>
          </div>

          <div class="vstack justify-between py-2 px-4">
            <label>
              Activate
              <input
                type="checkbox"
                id="autoresponse-activate"
                name="autoresponse-enabled"
                role="switch"
              />
            </label>

            <button
              id="client-connect-btn"
              data-variant="secondary"
              commandfor="autoresponse"
              command="show-modal"
            >
              Autoresponse options
            </button>
          </div>
        </div>
      </div>

      <div id="chat" class="vstack gap-0">
        <div class="title hstack justify-between w-100 py-2 px-4">
          <span>Messages</span>
          <button class="small" data-variant="secondary" id="clear-chat">
            Clear
          </button>
        </div>

        <div id="messages" class="vstack gap-0">
          <div id="no-connection">
            <span>No connection</span><br />
            <span>Configure and connect to a server.</span>
          </div>
        </div>

        <form id="message-form" class="py-2 px-4 vstack gap-2">
          <textarea
            type="text"
            placeholder="Type a message..."
            required
            name="message"
          ></textarea>
          <div class="hstack gap-2 justify-end">
            <button
              class="small"
              commandfor="autobuild"
              command="show-modal"
              type="button"
              data-variant="secondary"
            >
              Autobuild
            </button>
            <button class="small" data-variant="secondary" type="reset">
              Clear
            </button>
            <button data-variant="primary" class="small" disabled type="submit">
              Send
            </button>
          </div>
        </form>
      </div>

      <div id="special-chars" class="vstack">
        <button class="small" data-variant="secondary" disabled>ENQ</button>
        <button class="small" data-variant="secondary" disabled>EOT</button>
        <button class="small" data-variant="secondary" disabled>VT</button>
        <button class="small" data-variant="secondary" disabled>FS.CR</button>
        <button class="small" data-variant="secondary" disabled>CR</button>
        <button class="small" data-variant="secondary" disabled>ACK</button>
        <button class="small" data-variant="secondary" disabled>NAK</button>
      </div>
    </main>

    <dialog id="autobuild" closedby="any">
      <div>
        <form method="dialog">
          <label>
            Input:
            <textarea
              type="text"
              placeholder="Type a message..."
              required
              name="input"
            ></textarea>
          </label>
          <label>
            Output:
            <textarea
              type="text"
              placeholder="Autobuilt message will appear here"
              readonly
              name="output"
            ></textarea>
          </label>

          <div class="hstack gap-2 py-2">
            <label>
              No ETB ?
              <input type="checkbox" role="switch" name="no-etb" />
            </label>
          </div>

          <div class="hstack gap-2 justify-end">
            <button
              class="outline small"
              type="button"
              commandfor="autobuild"
              command="close"
            >
              Close
            </button>
            <button class="small" type="button" id="build-message">
              Build
            </button>
            <button data-variant="primary" class="small" type="submit">
              Build and copy to input
            </button>
          </div>
        </form>
      </div>
    </dialog>

    <dialog id="autoresponse" closedby="any">
      <div>
        <form method="dialog">
          <div class="hstack items-start">
            <div>
              <label>
                ASTM ACK
                <input type="text" name="astm_ack" value="&lt;ACK&gt;" />
              </label>
            </div>
            <div>
              <label>
                HL7 Type
                <input type="text" name="hl7_type" value="ACK^O21" />
              </label>
              <label>
                HL7 Code
                <input type="text" name="hl7_code" value="AA" />
              </label>
            </div>
          </div>

          <div class="hstack gap-2 justify-end pt-2">
            <button
              class="outline small"
              type="button"
              commandfor="autoresponse"
              command="close"
            >
              Close
            </button>
            <button class="small" type="submit">Save</button>
          </div>
        </form>
      </div>
    </dialog>
  </body>
</html>
